# link-manifest — DS 컴포넌트 허용 집합 + design page(DP-*) 레지스트리
# 단일 출처: design-system/ds-allowlist.md (컴포넌트) / design-pages/*.yaml (DP). 이 파일은 등록 인덱스다.
# 경로는 프로젝트 워크스페이스(foundation/) 기준.
version: 1
updated: 2026-06-19

design_system:
  source: design-system/ds-source/src/components/ui/
  guide: design-system/ds-allowlist.md
  components:
    # 기존 18종
    - Button
    - Input
    - Select
    - Table
    - Dialog
    - Card
    - Badge
    - Tabs
    - Checkbox
    - DropdownMenu
    - Form
    - Label
    - Sonner
    - Calendar
    - Popover
    - DataTable
    - FilterBar
    - DatePicker
    # 2026-06-19 추가 11종 (앱 셸 + 기본 컴포넌트)
    - Header
    - NavMenu
    - Avatar
    - Separator
    - Tooltip
    - Skeleton
    - Switch
    - Textarea
    - Alert
    - Breadcrumb
    - Sheet

design_pages:
  dir: design-pages/
  # DP 페이지 재작업 예정 (이전 DP-BASE/MAIN/POPUP 삭제됨). 재작성 시 여기에 등록.
  registry: []

# DP- ID는 숫자 시퀀스가 아니라 의미명(DP-MAIN·DP-POPUP·DP-BASE 등, spine-ids.md 참조).
# 따라서 숫자 next_id를 두지 않는다. 신규 DP는 의미명으로 발번하고 registry에 추가한다.
