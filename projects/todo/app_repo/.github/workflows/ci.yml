# PO-DEV-HARN — TODO app CI (스파인: PACK-TODO)
# 로컬 commit-msg 게이트(tdd-gate+commit-spine-id)와 동일한 테스트를 클린 환경에서 재실행한다.
name: ci
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # 백엔드 (API 레벨 — Vitest + Supertest)
      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend
      # 프론트 (화면 레벨 — Vitest + Testing Library)
      - run: npm ci
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: install deps
        run: |
          (cd backend && npm ci)
          (cd frontend && npm ci && npm i -D @playwright/test && npx playwright install --with-deps chromium)
      - name: start servers
        run: |
          (cd backend && PORT=3001 npm run start &) && sleep 3
          (cd frontend && npm run build && npm run preview -- --port 5173 --strictPort &) && sleep 3
      - name: e2e (JRN-TODO-MANAGE)
        run: npx playwright test e2e/jrn-todo-manage.spec.ts
        working-directory: frontend
