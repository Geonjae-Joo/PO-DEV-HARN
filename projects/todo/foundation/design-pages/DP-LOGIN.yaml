id: DP-LOGIN
version: 1
archetype: auth
description: 인증 전용 페이지 — 로그인/회원가입. Header/NavMenu 없이 중앙 Card 레이아웃. (D-004 결정)
# 배경은 브랜드 그라디언트, 중앙 카드에 폼 배치. Header/NavMenu slot 없음.
canvas:
  grid: { columns: 4, gap: space-4, max_width: 480 }
  breakpoints:
    - { name: lg, min: 1280, columns: 4 }
    - { name: md, min: 768,  columns: 4 }
    - { name: sm, min: 0,    columns: 4 }
slots:
  - { id: brand,       editable: false, locks: [Card] }   # 로고+앱명 고정
  - { id: form-body,   editable: true,  grid_columns: 4 } # 로그인 폼 캔버스
  - { id: form-footer, editable: true,  grid_columns: 4 } # 제출 버튼 + 링크
components:
  - ref: Card
    slot: brand
    order: 1
    note: 로그인 전체를 감싸는 중앙 카드 (배경과 대비)
  - ref: Form
    slot: form-body
    order: 1
    note: 폼 래퍼 (react-hook-form + Zod)
  - ref: Label
    slot: form-body
    order: 2
    note: 이메일/비밀번호 필드 레이블
  - ref: Input
    slot: form-body
    order: 3
    note: 이메일 + 비밀번호 입력 자리
  - ref: Checkbox
    slot: form-body
    order: 4
    note: 로그인 상태 유지 (remember me)
  - ref: Alert
    slot: form-body
    order: 5
    note: 로그인 오류 메시지 인라인 표시
  - ref: Button
    slot: form-footer
    order: 1
    note: 로그인 제출 버튼 (full-width, variant=default)
