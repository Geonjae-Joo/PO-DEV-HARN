# link-manifest — DS 컴포넌트 허용 집합 + design page(DP-*) 레지스트리 (foundation)
# 단일 출처: design-system/ds-allowlist.md (컴포넌트) / design-pages/*.yaml (DP). 이 파일은 등록 인덱스다.
# 경로는 프로젝트 워크스페이스(foundation/) 기준.
version: 1
updated: 2026-06-30

design_system:
  source: design-system/ds-source/src/components/ui/
  guide: design-system/ds-allowlist.md
  components:
    # 기본 (shadcn 계열 primitive)
    - Button
    - Input
    - Select
    - Textarea
    - Label
    - Card
    - Badge
    - Tabs
    - Switch
    - Skeleton
    - Avatar
    - DropdownMenu
    - Separator
    - Form
    # DevLog composite
    - Header
    - PostCard
    - FilterBar
    - PomodoroTimer
    - ContributionGraph
    - WeeklyChart
    - StatCard
    # 확장
    - Dialog
    - Alert
    - Tooltip
    - Checkbox
    - RadioGroup
    - Progress
    - Sheet
    - Popover
    - Accordion
    - Pagination

design_pages:
  dir: design-pages/
  registry:
    - id: DP-MAIN
      version: 1
      archetype: main
      slots: [header, content, footer]

# DP- ID는 의미명(DP-MAIN 등, spine-ids.md). 신규 DP는 의미명으로 발번하고 registry에 추가.
