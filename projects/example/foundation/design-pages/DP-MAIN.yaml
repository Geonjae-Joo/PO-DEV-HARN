schema_version: 2
id: DP-MAIN
version: 2
archetype: main
description: 목록·상세·폼 화면이 공통으로 사용하는 전체 페이지 기본 골격 (ADR-002 캔버스 모델 + ②와 통일된 layout)
# ADR-002 D3 — 캔버스 봉쇄: 슬롯을 locked(① 확정·SCR 참조 상속)와 editable(복사 시딩)로 구분.
# 스키마 통일: layout 은 screen-model-schema-v2 §7 형태. 인스턴스화 시
#   locked 슬롯(header/footer) → SCR로 복제 안 함(DP 참조 상속),
#   editable 슬롯(header-actions/content) → SCR.layout으로 복사 시딩(첫 렌더=DP 동일).
canvas:
  grid: { columns: 12, gap: space-4, max_width: 1440 }
  breakpoints:
    - { name: lg, min: 1280, columns: 12 }
    - { name: md, min: 768,  columns: 8 }
    - { name: sm, min: 0,    columns: 4 }
slots:
  - { id: header,         editable: false, locks: [Header, Breadcrumb] }   # 고정 구성
  - { id: header-actions, editable: true,  grid_columns: 12 }              # 화면별 주요 액션 자리
  - { id: content,        editable: true,  grid_columns: 12, overflow: scroll-y }  # 시작 디자인 캔버스
  - { id: footer,         editable: false, locks: [Separator] }            # 고정 구성
layout:
  # ── locked 슬롯: DP 참조 상속(SCR로 복제 안 함) ──
  - id: DPC-MAIN.header
    source: { kind: ds, ref: Header }
    position: { slot: header, base: { col_start: 1, col_span: full, row: 1 } }
    meta: { label: 상단 앱 헤더 (로고·전역 내비 자리) }
  - id: DPC-MAIN.breadcrumb
    source: { kind: ds, ref: Breadcrumb }
    position: { slot: header, base: { col_start: 1, col_span: full, row: 2 } }
    meta: { label: 현재 위치 경로 표시 }
  - id: DPC-MAIN.footerSep
    source: { kind: ds, ref: Separator }
    position: { slot: footer, base: { col_start: 1, col_span: full, row: 1 } }
    meta: { label: 콘텐츠와 푸터 구분선 }
  # ── editable 슬롯: SCR.layout으로 복사 시딩(표준 시작 디자인) ──
  - id: DPC-MAIN.actionBtn
    source: { kind: ds, ref: Button }
    position: { slot: header-actions, base: { col_start: 1, col_span: full, row: 1 } }
    meta: { label: 우측 상단 주요 액션 자리 }
  - id: DPC-MAIN.filterbar
    source: { kind: ds, ref: FilterBar }
    position: { slot: content, base: { col_start: 1, col_span: full, row: 1 } }
    meta: { label: 목록 검색/필터 영역 }
  - id: DPC-MAIN.table
    source: { kind: ds, ref: DataTable }
    position: { slot: content, base: { col_start: 1, col_span: full, row: 2 } }
    meta: { label: 메인 데이터 표 }
